version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: craft_db_container
    restart: always
    environment:
      POSTGRES_USER: craft_user
      POSTGRES_PASSWORD: craft_password
      POSTGRES_DB: craft_database
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
